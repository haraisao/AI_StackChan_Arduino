
<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta charset="utf-8">
        <style>
         .top {
            background-color: #aaaaff;
            margin:0;
            padding-top: 30px;
            text-align: center;
            height: 90px;
          }
        </style>
        <script type="text/javascript">
            async function request_tts(){
                var txt = document.getElementById("tts").value;
                var url ="/command";
                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: '{"cmd": "tts", "data": "' + txt + '"}'
                }
                );
                console.log(response);
            }

            async function request_asr(){
                var max_seconds = Number(document.getElementById("max_seconds").value);
                //var max_count = Number(document.getElementById("max_count").value);
                //var threshold = Number(document.getElementById("threshold").value);
                var max_count = 0;
                var threshold = 0;
                var url ="/asr";

                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: JSON.stringify({'max_seconds': max_seconds, 'max_count': max_count, 'threshold': threshold})
                }
                );
                console.log(response);
            }

            async function request_info(){
                var msg = document.getElementById("message").value;
                var url ="/command";

                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json;charset=utf-8",
                    },
                    body: JSON.stringify({'cmd': 'message', 'data': msg})
                }
                );
                console.log(response);
            }

            async function request_gemini(){
                var txt = document.getElementById("gemini").value;
                var url ="/command";
                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: '{"cmd": "gemini", "data": "' + txt + '"}'
                }
                );
                console.log(response);
            }

            async function save_tts_wav(){
                var txt = document.getElementById("tts").value;
                var url ="/command";
                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: '{"cmd": "save_tts", "data": "' + txt + '"}'
                }
                );
                console.log(response);
            }

            async function play_wav(){
                var txt = document.getElementById("tts").value;
                var url ="/command";
                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: '{"cmd": "play_wav", "data": "' + txt + '"}'
                }
                );
                console.log(response);
            }
        </script>
        <title>音声認識＆音声合成</title>
    </head>
    <body>
        <h1 class="top"><a href="/">音声認識＆音声合成</a></h1>
        <h2>音声合成</h2>
        発話する文字列: <input type="text" id="tts" value="" style="width:400px"><br>
       <button onclick="request_tts()">TTS</button><br>
       <button onclick="save_tts_wav()">Save Wav</button>
       <button onclick="play_wav()">Play Wav</button>

        <h2>音声認識</h2>
        最大録音時間（秒）:<input type="text" id="max_seconds" size="2" value="5"/><br>
<!--
        発話区間推定　閾値:<input type="text" id="threshold" size="5" value="41"/><br>
        発話区間推定　連続検出回数<input type="text" id="max_count" size="2" value="1"/><br>
-->
        <button onclick="request_asr()">スタート</button>

        <h2>Gemini or ChatGPT</h2>
        <textarea id="gemini" cols="80" rows="5"></textarea><br>
        <button onClick="request_gemini()">Message</button>

        <h1>Info</h1>
        <input id="message" value=""><button onClick="request_info()">Message</button>
        <hr>
        <a href="/">Back to Top</a>
    </body>
</html>
