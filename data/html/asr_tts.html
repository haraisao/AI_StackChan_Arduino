<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta charset="utf-8">
        <script type="text/javascript">
            async function request_tts(){
                var txt = document.getElementById("tts").value;
                var url ="/tts"
                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: txt
                }
                );
                console.log(response);
            }

            async function request_asr(){
                var max_seconds = Number(document.getElementById("max_seconds").value);
                var url ="/asr"

                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: JSON.stringify({'max_seconds': max_seconds})
                }
                );
                console.log(response);
            }

            async function request_info(){
                var msg = document.getElementById("message").value;
                var url ="/command";

                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json;charset=utf-8",
                    },
                    body: JSON.stringify({'cmd': 'message', 'data': msg})
                }
                );
                console.log(response);
            }

            async function request_gemini(){
                var txt = document.getElementById("gemini").value;
                var url ="/gemini"
                const response = await fetch(url,{
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8",
                    },
                    body: txt
                }
                );
                console.log(response);
            }
        </script>
        <title>音声認識＆音声合成</title>
    </head>
    <body>
        <h1>音声合成</h1>
        発話する文字列: <input type="text" id="tts" value=""><button onclick="request_tts()">TTS</button>

        <h1>音声認識</h1>
        最大録音時間（秒）:<input type="text" id="max_seconds" size="2" value="5"/><br>
        <button onclick="request_asr()">スタート</button>

        <h1>Gemini</h1>
        <textarea id="gemini" cols="80" rows="5"></textarea><br>
        <button onClick="request_gemini()">Message</button>


        <hr>
        <a href="/">Back to Top</a>
    </body>
</html>
